name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cinepals
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cinepals"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/cinepals?schema=public
      JWT_SECRET: ci-test-secret
      PUBLIC_URL: http://127.0.0.1:8990
      SMTP_URL: smtp://127.0.0.1:1025
      MAILPIT_URL: http://127.0.0.1:8025
      # Required by the search/suggestion specs. Add it as a repo secret:
      # Settings → Secrets and variables → Actions → New repository secret.
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync database schema (also generates Prisma client)
        run: pnpm exec prisma db push

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
