# Local development environment: Postgres database + app with hot-reload + Adminer.
#
# Start:   docker compose up
# The TMDB key (and optionally RESEND) can be placed in a .env file
# in the root: docker compose reads it automatically for variable substitution.
#
#   App:     http://127.0.0.1:8990/configure
#   Adminer: http://127.0.0.1:8080   (server: db, user: postgres, pass: postgres, db: stremio_friends)

services:
  db:
    image: postgres:16-alpine
    container_name: sf-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stremio_friends
    ports:
      # Host 5555 -> container 5432 (the app inside Docker still uses db:5432).
      - "5555:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stremio_friends"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sf-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8990:8990"
    environment:
      NODE_ENV: development
      PORT: "8990"
      PUBLIC_URL: http://127.0.0.1:8990
      DATABASE_URL: postgresql://postgres:postgres@db:5432/stremio_friends?schema=public
      JWT_SECRET: dev-insecure-secret-change-me
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Stremio Friends <noreply@example.com>}
    volumes:
      # Code mounted from the host for hot-reload; node_modules stays the one from the image.
      - ./:/app
      - /app/node_modules
    # db push: syncs the schema to the DB (without migration files) and generates the client.
    command: sh -c "npx prisma db push && npm run dev"

  # Web UI to inspect the database (optional).
  adminer:
    image: adminer:4
    container_name: sf-adminer
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  pgdata:
