# Render Blueprint: Node web service + Postgres database.
# Deploy: create a new Blueprint on Render pointing to this repo.
services:
  - type: web
    name: cinepals
    runtime: node
    plan: free
    # Free tier doesn't support preDeployCommand, so we sync the schema during
    # build (DATABASE_URL is available at build time). db push is idempotent.
    # corepack enable activates the pnpm version pinned in package.json.
    # NODE_ENV=production makes pnpm skip devDependencies, but the build needs
    # them (prisma, typescript). --prod=false forces them in for the build.
    buildCommand: corepack enable && pnpm install --prod=false && pnpm run build && pnpm exec prisma db push --accept-data-loss
    # Run the built server directly so runtime needs no package manager.
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cinepals-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a random secret
      - key: PUBLIC_URL
        sync: false # set it to the service's public URL, e.g. https://cinepals.onrender.com
      - key: TMDB_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: cinepals-db
    plan: free
