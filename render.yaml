# Render Blueprint: Node web service + Postgres database.
# Deploy: create a new Blueprint on Render pointing to this repo.
services:
  - type: web
    name: stremio-friends
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    # Sync the schema to the DB on every deploy (no migration files needed).
    # If you adopt Prisma migrations later, switch this to: npx prisma migrate deploy
    preDeployCommand: npx prisma db push
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stremio-friends-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a random secret
      - key: PUBLIC_URL
        sync: false # set it to the service's public URL, e.g. https://stremio-friends.onrender.com
      - key: TMDB_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: stremio-friends-db
    plan: free
