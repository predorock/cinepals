# Render Blueprint: Node web service + Postgres database.
# Deploy: create a new Blueprint on Render pointing to this repo.
services:
  - type: web
    name: cinepals
    runtime: node
    plan: free
    # Free tier doesn't support preDeployCommand, so we sync the schema during
    # build (DATABASE_URL is available at build time). db push is idempotent.
    # Use `corepack pnpm` (not `corepack enable`): enable tries to symlink into
    # /usr/bin, which is read-only on Render (EROFS). corepack runs the pnpm
    # version pinned in package.json directly. NODE_ENV=production makes pnpm
    # skip devDependencies, but the build needs them (prisma, typescript), so
    # --prod=false forces them in.
    buildCommand: corepack pnpm install --prod=false && corepack pnpm run build && corepack pnpm exec prisma db push --accept-data-loss
    # Run the built server directly so runtime needs no package manager.
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Don't prompt to download pnpm in the non-interactive build.
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: cinepals-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a random secret
      - key: PUBLIC_URL
        sync: false # set it to the service's public URL, e.g. https://cinepals.onrender.com
      - key: TMDB_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CRON_SECRET
        sync: false # must match the CRON_SECRET secret in the GitHub Actions digest workflow

databases:
  - name: cinepals-db
    plan: free
