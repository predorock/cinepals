# Render Blueprint: Node web service + Postgres database.
# Deploy: create a new Blueprint on Render pointing to this repo.
services:
  - type: web
    name: cinepals
    runtime: node
    plan: free
    # Free tier doesn't support preDeployCommand, so we sync the schema during
    # build (DATABASE_URL is available at build time). db push is idempotent.
    # NODE_ENV=production makes `npm install` skip devDependencies, but the build
    # needs them (prisma, typescript). --include=dev forces them in for the build.
    buildCommand: npm install --include=dev && npm run build && npx prisma db push --accept-data-loss
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cinepals-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a random secret
      - key: PUBLIC_URL
        sync: false # set it to the service's public URL, e.g. https://cinepals.onrender.com
      - key: TMDB_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: cinepals-db
    plan: free
